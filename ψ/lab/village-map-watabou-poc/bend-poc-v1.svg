<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Bend — south reach (Watabou-style POC)">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&amp;family=IM+Fell+English+SC&amp;display=swap');
      .label { font-family: 'Caveat', cursive; font-weight: 600; font-size: 18px; fill: #2b1d11; }
      .label-small { font-family: 'Caveat', cursive; font-weight: 400; font-size: 13px; fill: #4a3a26; }
      .label-italic { font-family: 'IM Fell English SC', serif; font-style: italic; font-size: 22px; fill: #2b1d11; letter-spacing: 0.05em; }
      .label-tiny { font-family: 'Caveat', cursive; font-weight: 400; font-size: 11px; fill: #4a3a26; font-style: italic; }
    </style>

    <pattern id="parchment-texture" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#f4ecd6" />
      <circle cx="13" cy="22" r="0.5" fill="#d4c5a3" opacity="0.5" />
      <circle cx="67" cy="14" r="0.5" fill="#d4c5a3" opacity="0.5" />
      <circle cx="42" cy="78" r="0.5" fill="#d4c5a3" opacity="0.5" />
      <circle cx="85" cy="55" r="0.5" fill="#d4c5a3" opacity="0.5" />
      <circle cx="29" cy="61" r="0.5" fill="#d4c5a3" opacity="0.5" />
      <circle cx="73" cy="88" r="0.4" fill="#c4a878" opacity="0.4" />
      <circle cx="8" cy="92" r="0.4" fill="#c4a878" opacity="0.4" />
    </pattern>

    <pattern id="hatch-field" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#6b513b" stroke-width="0.4" opacity="0.45" />
    </pattern>

    <pattern id="hatch-field-cross" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#6b513b" stroke-width="0.35" opacity="0.4" />
    </pattern>

    <pattern id="mud-shelf" x="0" y="0" width="5" height="5" patternUnits="userSpaceOnUse">
      <circle cx="2.5" cy="2.5" r="0.6" fill="#8a7656" opacity="0.6" />
      <circle cx="0.5" cy="4" r="0.4" fill="#6b513b" opacity="0.4" />
    </pattern>
  </defs>

  <!-- Parchment background -->
  <rect width="800" height="600" fill="url(#parchment-texture)" />

  <!-- Paper border (double-line, period-feel) -->
  <rect x="8" y="8" width="784" height="584" fill="none" stroke="#6b513b" stroke-width="1.5" opacity="0.55" />
  <rect x="14" y="14" width="772" height="572" fill="none" stroke="#6b513b" stroke-width="0.5" opacity="0.4" />

  <!-- ============================== -->
  <!-- TERRAIN: fields & forests      -->
  <!-- ============================== -->

  <!-- North field (millet) — hatched -->
  <path d="M 80 60 Q 240 70 360 95 L 360 195 Q 240 185 80 175 Z" fill="url(#hatch-field)" />
  <path d="M 80 60 Q 240 70 360 95 L 360 195 Q 240 185 80 175 Z" fill="none" stroke="#6b513b" stroke-width="1" opacity="0.65" />
  <text x="170" y="135" class="label-small">millet field</text>

  <!-- East field (rice paddy) — cross-hatched -->
  <path d="M 540 70 L 760 80 L 760 220 L 540 210 Z" fill="url(#hatch-field-cross)" />
  <path d="M 540 70 L 760 80 L 760 220 L 540 210 Z" fill="none" stroke="#6b513b" stroke-width="1" opacity="0.65" />
  <text x="600" y="155" class="label-small">rice paddy</text>

  <!-- Willow grove (lower-left, by the willow root) — Gorn's #6A8360 sage -->
  <g>
    <circle cx="100" cy="500" r="22" fill="#6A8360" opacity="0.7" stroke="#3d4f37" stroke-width="1.2" />
    <circle cx="135" cy="490" r="18" fill="#6A8360" opacity="0.7" stroke="#3d4f37" stroke-width="1.2" />
    <circle cx="120" cy="525" r="20" fill="#6A8360" opacity="0.7" stroke="#3d4f37" stroke-width="1.2" />
    <circle cx="160" cy="510" r="16" fill="#6A8360" opacity="0.7" stroke="#3d4f37" stroke-width="1.2" />
    <circle cx="80" cy="530" r="14" fill="#6A8360" opacity="0.7" stroke="#3d4f37" stroke-width="1.2" />
    <text x="65" y="565" class="label">willow grove</text>
  </g>

  <!-- Single tree (south side, near the slab) -->
  <g transform="translate(620, 470)">
    <circle cx="0" cy="0" r="14" fill="#6A8360" opacity="0.7" stroke="#3d4f37" stroke-width="1.1" />
    <line x1="0" y1="14" x2="0" y2="22" stroke="#5a3e22" stroke-width="2" />
  </g>

  <!-- ============================== -->
  <!-- RIVER + CANAL                  -->
  <!-- ============================== -->

  <!-- Bank shadow (sandy edge, slightly wider than water) -->
  <path
    d="M 80 240
       Q 180 270 250 320
       Q 320 360 340 420
       Q 360 480 420 510
       Q 500 540 580 540
       Q 660 540 740 560"
    fill="none"
    stroke="#c4a878"
    stroke-width="58"
    stroke-linecap="round"
    opacity="0.5"
  />

  <!-- Water fill (pale gray-blue) -->
  <path
    d="M 80 240
       Q 180 270 250 320
       Q 320 360 340 420
       Q 360 480 420 510
       Q 500 540 580 540
       Q 660 540 740 560"
    fill="none"
    stroke="#cdd9d4"
    stroke-width="44"
    stroke-linecap="round"
  />

  <!-- North bank line (defines edge) -->
  <path
    d="M 80 218 Q 180 248 250 298 Q 320 338 340 398 Q 360 458 420 488 Q 500 518 580 518 Q 660 518 740 538"
    fill="none"
    stroke="#6b513b"
    stroke-width="1.5"
    opacity="0.9"
  />
  <!-- South bank line -->
  <path
    d="M 80 262 Q 180 292 250 342 Q 320 382 340 442 Q 360 502 420 532 Q 500 562 580 562 Q 660 562 740 582"
    fill="none"
    stroke="#6b513b"
    stroke-width="1.5"
    opacity="0.9"
  />

  <!-- Center current line (dashed, thin, indicates flow) -->
  <path
    d="M 90 240 Q 190 270 260 320 Q 330 360 350 420 Q 370 480 430 510 Q 510 540 590 540 Q 670 540 740 560"
    fill="none"
    stroke="#5a6f7a"
    stroke-width="0.7"
    stroke-dasharray="6 4"
    opacity="0.55"
  />

  <!-- ============================== -->
  <!-- MUD SHELF (canal drop feature) -->
  <!-- ============================== -->
  <path
    d="M 320 462 Q 360 490 420 518 Q 480 545 540 552 Q 580 555 580 568 Q 540 572 480 567 Q 420 562 370 540 Q 330 522 312 492 Z"
    fill="url(#mud-shelf)"
    stroke="#6b513b"
    stroke-width="1.1"
    opacity="0.95"
  />
  <!-- Curved label following the shelf shape -->
  <text x="430" y="586" class="label-small">mud shelf — wider since the drop</text>

  <!-- Shore stones (small pebbles along banks, hand-drawn feel) -->
  <g fill="#9b8a72" stroke="#3e2c18" stroke-width="0.5">
    <ellipse cx="180" cy="245" rx="3" ry="2" />
    <ellipse cx="220" cy="285" rx="2.5" ry="1.8" transform="rotate(20 220 285)" />
    <ellipse cx="295" cy="328" rx="3" ry="2.2" />
    <ellipse cx="640" cy="535" rx="3" ry="2" />
    <ellipse cx="680" cy="540" rx="2.5" ry="1.8" transform="rotate(-15 680 540)" />
    <ellipse cx="710" cy="555" rx="3" ry="2" />
    <ellipse cx="120" cy="248" rx="2" ry="1.5" />
    <ellipse cx="155" cy="262" rx="2.4" ry="1.7" transform="rotate(35 155 262)" />
  </g>

  <!-- Crayfish holes (upstream side, two holes — one occupied) -->
  <g>
    <circle cx="140" cy="262" r="2.5" fill="#1a0e05" />
    <circle cx="160" cy="270" r="2.2" fill="#1a0e05" />
    <!-- Feeler hint on occupied hole -->
    <line x1="140" y1="262" x2="135" y2="258" stroke="#1a0e05" stroke-width="0.4" />
    <line x1="140" y1="262" x2="138" y2="256" stroke="#1a0e05" stroke-width="0.4" />
    <text x="100" y="232" class="label-tiny">crayfish holes</text>
  </g>

  <!-- ============================== -->
  <!-- BRIDGE (south bend bridge arch) -->
  <!-- ============================== -->
  <g>
    <!-- Stone abutments (visible on each bank) -->
    <rect x="478" y="510" width="14" height="50" fill="#9b8a72" stroke="#2b1d11" stroke-width="1.2" />
    <rect x="546" y="510" width="14" height="50" fill="#9b8a72" stroke="#2b1d11" stroke-width="1.2" />
    <!-- Stone block hatching on abutments -->
    <line x1="478" y1="525" x2="492" y2="525" stroke="#2b1d11" stroke-width="0.4" opacity="0.5" />
    <line x1="478" y1="540" x2="492" y2="540" stroke="#2b1d11" stroke-width="0.4" opacity="0.5" />
    <line x1="485" y1="510" x2="485" y2="560" stroke="#2b1d11" stroke-width="0.4" opacity="0.4" />
    <line x1="546" y1="525" x2="560" y2="525" stroke="#2b1d11" stroke-width="0.4" opacity="0.5" />
    <line x1="546" y1="540" x2="560" y2="540" stroke="#2b1d11" stroke-width="0.4" opacity="0.5" />
    <line x1="553" y1="510" x2="553" y2="560" stroke="#2b1d11" stroke-width="0.4" opacity="0.4" />

    <!-- Arch underneath (water passes under) -->
    <path d="M 492 540 Q 519 520 546 540" fill="none" stroke="#2b1d11" stroke-width="1.5" />
    <path d="M 492 545 Q 519 528 546 545" fill="none" stroke="#2b1d11" stroke-width="0.6" opacity="0.5" />

    <!-- Plank deck on top -->
    <rect x="476" y="498" width="86" height="14" fill="#a08560" stroke="#2b1d11" stroke-width="1.2" />
    <line x1="496" y1="498" x2="496" y2="512" stroke="#2b1d11" stroke-width="0.6" opacity="0.7" />
    <line x1="516" y1="498" x2="516" y2="512" stroke="#2b1d11" stroke-width="0.6" opacity="0.7" />
    <line x1="536" y1="498" x2="536" y2="512" stroke="#2b1d11" stroke-width="0.6" opacity="0.7" />
    <!-- Plank wear/grain -->
    <line x1="479" y1="505" x2="490" y2="504" stroke="#2b1d11" stroke-width="0.3" opacity="0.4" />
    <line x1="520" y1="503" x2="535" y2="505" stroke="#2b1d11" stroke-width="0.3" opacity="0.4" />

    <!-- Label with leader to bridge -->
    <line x1="519" y1="498" x2="519" y2="478" stroke="#2b1d11" stroke-width="0.5" opacity="0.6" />
    <text x="519" y="470" class="label" text-anchor="middle">south bend bridge</text>
  </g>

  <!-- ============================== -->
  <!-- FLAT SLAB (Pip's spot)         -->
  <!-- ============================== -->
  <g>
    <!-- Slab body — irregular flat stone, sitting on mud shelf -->
    <path
      d="M 360 472 Q 380 463 405 466 Q 428 471 446 481 Q 459 489 453 503 Q 443 516 421 519 Q 396 521 374 513 Q 358 503 358 489 Q 358 479 360 472 Z"
      fill="#b3a482"
      stroke="#2b1d11"
      stroke-width="1.5"
    />
    <!-- Slab inner cracks -->
    <line x1="380" y1="478" x2="395" y2="491" stroke="#2b1d11" stroke-width="0.5" opacity="0.55" />
    <line x1="412" y1="491" x2="427" y2="501" stroke="#2b1d11" stroke-width="0.5" opacity="0.55" />
    <line x1="375" y1="500" x2="385" y2="508" stroke="#2b1d11" stroke-width="0.4" opacity="0.4" />

    <!-- Shell pile — small cluster of opened mussels -->
    <g fill="#e0d4ba" stroke="#5a3e22" stroke-width="0.4">
      <ellipse cx="395" cy="498" rx="2.2" ry="1.6" />
      <ellipse cx="400" cy="495" rx="2" ry="1.4" transform="rotate(20 400 495)" />
      <ellipse cx="392" cy="503" rx="2.2" ry="1.6" transform="rotate(-15 392 503)" />
      <ellipse cx="404" cy="501" rx="1.8" ry="1.3" transform="rotate(35 404 501)" />
      <ellipse cx="389" cy="495" rx="1.9" ry="1.4" transform="rotate(-25 389 495)" />
    </g>

    <!-- Label with leader -->
    <line x1="405" y1="466" x2="405" y2="450" stroke="#2b1d11" stroke-width="0.5" opacity="0.6" />
    <text x="405" y="442" class="label" text-anchor="middle">flat slab</text>
    <text x="405" y="458" class="label-tiny" text-anchor="middle">shell pile, sun-warm</text>
  </g>

  <!-- ============================== -->
  <!-- HERON (downstream, watching)   -->
  <!-- ============================== -->
  <g transform="translate(648, 568)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="6.5" ry="3.8" fill="#5a6f7a" stroke="#2b1d11" stroke-width="0.6" />
    <!-- Long S-neck -->
    <path d="M 4 -2 Q 9 -7 7 -14 Q 5 -19 9 -22" fill="none" stroke="#5a6f7a" stroke-width="2.2" stroke-linecap="round" />
    <!-- Head -->
    <circle cx="9" cy="-22" r="2" fill="#5a6f7a" stroke="#2b1d11" stroke-width="0.5" />
    <!-- Beak (sharp, forward) -->
    <line x1="11" y1="-22" x2="17" y2="-22" stroke="#2b1d11" stroke-width="1.1" />
    <!-- Crest plume -->
    <line x1="9" y1="-24" x2="11" y2="-28" stroke="#2b1d11" stroke-width="0.5" />
    <!-- Legs (long, thin) -->
    <line x1="-2" y1="3" x2="-3" y2="14" stroke="#2b1d11" stroke-width="0.7" />
    <line x1="2" y1="3" x2="3" y2="14" stroke="#2b1d11" stroke-width="0.7" />
    <!-- Feet hint -->
    <line x1="-3" y1="14" x2="-6" y2="15" stroke="#2b1d11" stroke-width="0.5" />
    <line x1="3" y1="14" x2="6" y2="15" stroke="#2b1d11" stroke-width="0.5" />
  </g>
  <text x="630" y="555" class="label-tiny" text-anchor="middle">heron — patient teacher</text>

  <!-- ============================== -->
  <!-- PATHS                          -->
  <!-- ============================== -->
  <!-- Path from bridge into the village (north, toward the square) -->
  <path
    d="M 519 498 Q 530 460 540 410 Q 550 360 560 310 Q 570 260 580 210"
    fill="none"
    stroke="#2b1d11"
    stroke-width="1"
    stroke-dasharray="3 3"
    opacity="0.65"
  />
  <text x="555" y="280" class="label-tiny" transform="rotate(-78 555 280)">to the square</text>

  <!-- Path from bridge to willow grove -->
  <path
    d="M 519 562 Q 460 580 380 572 Q 280 560 200 542 Q 150 530 130 510"
    fill="none"
    stroke="#2b1d11"
    stroke-width="1"
    stroke-dasharray="3 3"
    opacity="0.65"
  />

  <!-- Path from willow into the south fields -->
  <path
    d="M 100 500 Q 60 470 50 420 Q 45 380 60 340"
    fill="none"
    stroke="#2b1d11"
    stroke-width="1"
    stroke-dasharray="3 3"
    opacity="0.55"
  />

  <!-- ============================== -->
  <!-- COMPASS ROSE                   -->
  <!-- ============================== -->
  <g transform="translate(720, 100)">
    <circle cx="0" cy="0" r="32" fill="#f4ecd6" stroke="#2b1d11" stroke-width="1.1" />
    <circle cx="0" cy="0" r="22" fill="none" stroke="#2b1d11" stroke-width="0.6" opacity="0.7" />
    <!-- Cardinal arrows -->
    <path d="M 0 -28 L 5 0 L 0 0 L -5 0 Z" fill="#2b1d11" />
    <path d="M 0 28 L 5 0 L 0 0 L -5 0 Z" fill="none" stroke="#2b1d11" stroke-width="0.8" />
    <path d="M -28 0 L 0 5 L 0 0 L 0 -5 Z" fill="none" stroke="#2b1d11" stroke-width="0.8" />
    <path d="M 28 0 L 0 5 L 0 0 L 0 -5 Z" fill="none" stroke="#2b1d11" stroke-width="0.8" />
    <!-- Diagonal hairlines -->
    <line x1="-19" y1="-19" x2="19" y2="19" stroke="#2b1d11" stroke-width="0.4" opacity="0.5" />
    <line x1="-19" y1="19" x2="19" y2="-19" stroke="#2b1d11" stroke-width="0.4" opacity="0.5" />
    <!-- Center dot -->
    <circle cx="0" cy="0" r="1.6" fill="#2b1d11" />
    <!-- Cardinal labels -->
    <text x="0" y="-36" font-family="IM Fell English SC, serif" font-size="14" fill="#2b1d11" text-anchor="middle">N</text>
    <text x="36" y="4" font-family="IM Fell English SC, serif" font-size="11" fill="#2b1d11" opacity="0.8">E</text>
    <text x="0" y="44" font-family="IM Fell English SC, serif" font-size="11" fill="#2b1d11" text-anchor="middle" opacity="0.8">S</text>
    <text x="-40" y="4" font-family="IM Fell English SC, serif" font-size="11" fill="#2b1d11" opacity="0.8">W</text>
  </g>

  <!-- ============================== -->
  <!-- SCALE BAR                      -->
  <!-- ============================== -->
  <g transform="translate(50, 555)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="#2b1d11" stroke-width="1.5" />
    <line x1="0" y1="-3" x2="0" y2="3" stroke="#2b1d11" stroke-width="1.5" />
    <line x1="50" y1="-3" x2="50" y2="3" stroke="#2b1d11" stroke-width="1" />
    <line x1="100" y1="-3" x2="100" y2="3" stroke="#2b1d11" stroke-width="1.5" />
    <rect x="0" y="-2" width="50" height="3" fill="#2b1d11" />
    <rect x="50" y="-1" width="50" height="3" fill="none" stroke="#2b1d11" stroke-width="0.5" />
    <text x="0" y="-8" class="label-tiny" text-anchor="middle">0</text>
    <text x="50" y="-8" class="label-tiny" text-anchor="middle">25m</text>
    <text x="100" y="-8" class="label-tiny" text-anchor="middle">50m</text>
  </g>

  <!-- ============================== -->
  <!-- TITLE & SUBTITLE               -->
  <!-- ============================== -->
  <text x="40" y="50" class="label-italic">The Bend — south reach</text>
  <text x="40" y="72" class="label-tiny">where the canal slows and the slab catches sun</text>
</svg>
