<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient — deep charcoal, warm center -->
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#1e1c1a"/>
      <stop offset="100%" stop-color="#0e0e0d"/>
    </radialGradient>
    <!-- Paw fill — warm amber, richer gradient -->
    <radialGradient id="paw" cx="48%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#f0b45a"/>
      <stop offset="45%" stop-color="#d4943a"/>
      <stop offset="100%" stop-color="#b07028"/>
    </radialGradient>
    <!-- Inner shadow on paw for depth -->
    <radialGradient id="pawShadow" cx="50%" cy="90%" r="60%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <!-- Ambient glow -->
    <radialGradient id="glow" cx="50%" cy="46%" r="32%">
      <stop offset="0%" stop-color="rgba(212, 148, 58, 0.10)"/>
      <stop offset="100%" stop-color="rgba(212, 148, 58, 0)"/>
    </radialGradient>
    <!-- Subtle top highlight on paw -->
    <linearGradient id="highlight" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background fill -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle warm glow behind paw -->
  <circle cx="512" cy="490" r="330" fill="url(#glow)"/>

  <!-- Paw print group — optically centered (slightly above geometric center) -->
  <g transform="translate(512, 475)">
    <!-- Shadow layer — offset down slightly for depth -->
    <g fill="rgba(0,0,0,0.25)" transform="translate(0, 8)">
      <ellipse cx="0" cy="80" rx="130" ry="110"/>
      <ellipse cx="-145" cy="-60" rx="58" ry="70" transform="rotate(-12, -145, -60)"/>
      <ellipse cx="-52" cy="-115" rx="55" ry="68" transform="rotate(-4, -52, -115)"/>
      <ellipse cx="52" cy="-115" rx="55" ry="68" transform="rotate(4, 52, -115)"/>
      <ellipse cx="145" cy="-60" rx="58" ry="70" transform="rotate(12, 145, -60)"/>
    </g>

    <!-- Main paw — amber gradient -->
    <g fill="url(#paw)">
      <!-- Main pad -->
      <ellipse cx="0" cy="80" rx="130" ry="110"/>
      <!-- Left outer toe -->
      <ellipse cx="-145" cy="-60" rx="58" ry="70" transform="rotate(-12, -145, -60)"/>
      <!-- Left inner toe -->
      <ellipse cx="-52" cy="-115" rx="55" ry="68" transform="rotate(-4, -52, -115)"/>
      <!-- Right inner toe -->
      <ellipse cx="52" cy="-115" rx="55" ry="68" transform="rotate(4, 52, -115)"/>
      <!-- Right outer toe -->
      <ellipse cx="145" cy="-60" rx="58" ry="70" transform="rotate(12, 145, -60)"/>
    </g>

    <!-- Highlight layer — subtle top-light effect -->
    <g fill="url(#highlight)">
      <ellipse cx="0" cy="80" rx="130" ry="110"/>
      <ellipse cx="-145" cy="-60" rx="58" ry="70" transform="rotate(-12, -145, -60)"/>
      <ellipse cx="-52" cy="-115" rx="55" ry="68" transform="rotate(-4, -52, -115)"/>
      <ellipse cx="52" cy="-115" rx="55" ry="68" transform="rotate(4, 52, -115)"/>
      <ellipse cx="145" cy="-60" rx="58" ry="70" transform="rotate(12, 145, -60)"/>
    </g>
  </g>
</svg>
